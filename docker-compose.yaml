# ============================================================================
# MeshCentral Production Stack — Docker Compose
# Services: MeshCentral + MongoDB (Replica Set)
# Compatible with Coolify Docker Compose deployment
# ============================================================================

services:
  # ── MeshCentral Server ──────────────────────────────────────────────────
  meshcentral:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # ── Core Settings ──
      - MC_HOSTNAME=${MC_HOSTNAME:-187.127.134.246}
      - MC_PORT=443
      - MC_MONGODB=mongodb://meshcentral:${MONGO_PASSWORD:-changeme}@mongodb:27017/meshcentral?authSource=admin
      - MC_REVERSE_PROXY=${MC_REVERSE_PROXY:-false}
      - MC_REVERSE_PROXY_PORT=${MC_REVERSE_PROXY_PORT:-443}
      - MC_SESSION_KEY=${MC_SESSION_KEY:-}
      # ── Feature Flags ──
      - MC_ALLOW_NEW_ACCOUNTS=${MC_ALLOW_NEW_ACCOUNTS:-false}
      - MC_ALLOW_LOGIN_TOKEN=true
      - MC_ALLOW_FRAME=${MC_ALLOW_FRAME:-false}
      - MC_MINIFY=true
      - MC_WEBRTC=${MC_WEBRTC:-false}
      # ── SMTP (Optional) ──
      - MC_SMTP_HOST=${MC_SMTP_HOST:-}
      - MC_SMTP_PORT=${MC_SMTP_PORT:-587}
      - MC_SMTP_FROM=${MC_SMTP_FROM:-}
      - MC_SMTP_USER=${MC_SMTP_USER:-}
      - MC_SMTP_PASS=${MC_SMTP_PASS:-}
      - MC_SMTP_TLS=${MC_SMTP_TLS:-true}
      # ── Node.js ──
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meshcentral-http.entrypoints=http"
      - "traefik.http.routers.meshcentral-http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.meshcentral-http.service=meshcentral-svc"
      - "traefik.http.services.meshcentral-svc.loadbalancer.server.port=443"
      - "caddy_ingress_network=coolify"
    expose:
      - "443"
    volumes:
      - meshcentral-data:/opt/meshcentral/meshcentral-data
      - meshcentral-files:/opt/meshcentral/meshcentral-files
      - meshcentral-backups:/opt/meshcentral/meshcentral-backups
    networks:
      - meshcentral-network
      - coolify
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:443/"]
      interval: 30s
      timeout: 15s
      start_period: 180s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── MongoDB Database ────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=meshcentral
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-changeme}
      - MONGO_INITDB_DATABASE=meshcentral
    command: ["mongod", "--bind_ip_all", "--quiet"]
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - meshcentral-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Named Volumes ───────────────────────────────────────────────────────
volumes:
  meshcentral-data:
  meshcentral-files:
  meshcentral-backups:
  mongodb-data:
  mongodb-config:

# ── Network ─────────────────────────────────────────────────────────────
networks:
  meshcentral-network:
    driver: bridge
  coolify:
    external: true
